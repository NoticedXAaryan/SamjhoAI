services:
  - type: web
    name: samjho-ai
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate:deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: samjho-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: APP_ORIGIN
        fromService:
          name: samjho-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: samjho-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
    ipAllowList: []
