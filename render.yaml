services:
  - type: web
    name: samjho-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate:deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: APP_ORIGIN
        sync: false
