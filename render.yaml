services:
  - type: web
    name: samjho-ai
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production tsx server.ts
    healthCheckPath: /health
    envVars:
      - key: APP_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EMAIL_RESEND_API_KEY
        sync: false
